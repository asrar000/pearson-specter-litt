version: "3.9"

services:
  psl-ai:
    build: .
    container_name: psl-ai-legal
    ports:
      - "8000:8000"
    volumes:
      - psl-data:/app/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CHROMA_DB_PATH=/app/data/chroma
      - SQLITE_DB_PATH=/app/data/psl.db
      - UPLOAD_DIR=/app/data/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  psl-data:
